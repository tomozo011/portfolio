<svg xmlns="http://www.w3.org/2000/svg" width="600" height="260" viewBox="0 0 600 260">
  <!-- Background -->
  <rect width="600" height="260" fill="#FFF8F2"/>

  <!-- Decorative circles -->
  <circle cx="555" cy="35" r="44" fill="#F0D4B8" opacity="0.45"/>
  <circle cx="40" cy="215" r="28" fill="#F0D4B8" opacity="0.35"/>

  <!-- Shopping bag (main icon, left-center) -->
  <!-- Bag body (trapezoid style) -->
  <path d="M 130,85 L 100,220 L 270,220 L 240,85 Z" fill="white" stroke="#1A3D6B" stroke-width="4" stroke-linejoin="round"/>
  <!-- Bag handles -->
  <path d="M 155,85 C 155,50 215,50 215,85" fill="none" stroke="#1A3D6B" stroke-width="5" stroke-linecap="round"/>
  <!-- Bag brand strip (decorative) -->
  <rect x="100" y="128" width="170" height="22" fill="#1A3D6B" opacity="0.08"/>
  <!-- Bag label -->
  <text x="185" y="143" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1A3D6B" opacity="0.4" text-anchor="middle">SHOP</text>
  <!-- Stars on bag -->
  <text x="145" y="100" font-family="Arial" font-size="14" fill="#E0A830">★</text>
  <text x="165" y="100" font-family="Arial" font-size="14" fill="#E0A830">★</text>
  <text x="185" y="100" font-family="Arial" font-size="14" fill="#E0A830">★</text>
  <text x="205" y="100" font-family="Arial" font-size="14" fill="#E0A830">★</text>
  <text x="225" y="100" font-family="Arial" font-size="14" fill="#E0A830" opacity="0.4">★</text>

  <!-- Product box (behind bag, small) -->
  <rect x="265" y="160" width="55" height="55" rx="4" fill="#1A3D6B" opacity="0.08" stroke="#1A3D6B" stroke-width="2" opacity="0.2"/>
  <line x1="265" y1="187" x2="320" y2="187" stroke="#1A3D6B" stroke-width="1.5" opacity="0.2"/>
  <line x1="292" y1="160" x2="292" y2="215" stroke="#1A3D6B" stroke-width="1.5" opacity="0.2"/>

  <!-- Chat bubble (support) -->
  <rect x="320" y="48" width="255" height="130" rx="14" fill="#1A3D6B"/>
  <polygon points="320,100 300,110 320,120" fill="#1A3D6B"/>
  <!-- Q heading -->
  <text x="397" y="80" font-family="Noto Sans JP, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">購入前のご質問に答えます</text>
  <!-- Divider -->
  <line x1="336" y1="88" x2="558" y2="88" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Q&A items -->
  <circle cx="348" cy="104" r="8" fill="white" opacity="0.15"/>
  <text x="348" y="108" font-family="Arial" font-size="10" font-weight="700" fill="white" text-anchor="middle">Q</text>
  <text x="364" y="108" font-family="Noto Sans JP, sans-serif" font-size="10.5" fill="white">サイズ感はどうですか？</text>

  <circle cx="348" cy="126" r="8" fill="white" opacity="0.15"/>
  <text x="348" y="130" font-family="Arial" font-size="10" font-weight="700" fill="white" text-anchor="middle">Q</text>
  <text x="364" y="130" font-family="Noto Sans JP, sans-serif" font-size="10.5" fill="white">返品・交換はできますか？</text>

  <circle cx="348" cy="148" r="8" fill="white" opacity="0.15"/>
  <text x="348" y="152" font-family="Arial" font-size="10" font-weight="700" fill="white" text-anchor="middle">Q</text>
  <text x="364" y="152" font-family="Noto Sans JP, sans-serif" font-size="10.5" fill="white">配送はいつ届きますか？</text>

  <!-- Instant reply badge -->
  <rect x="336" y="162" width="96" height="20" rx="10" fill="rgba(255,255,255,0.15)"/>
  <circle cx="350" cy="172" r="4" fill="#4ADE80"/>
  <text x="360" y="176" font-family="Noto Sans JP, sans-serif" font-size="9" fill="white">即時自動回答</text>

  <!-- Rating label below stars -->
  <text x="185" y="115" font-family="Noto Sans JP, sans-serif" font-size="9" fill="#1A3D6B" opacity="0.4" text-anchor="middle">4.2 / 5.0</text>

  <!-- Floating small question marks decorative -->
  <text x="88" y="80" font-family="Arial Black" font-size="28" fill="#1A3D6B" opacity="0.06">?</text>
  <text x="62" y="130" font-family="Arial Black" font-size="18" fill="#1A3D6B" opacity="0.05">?</text>

  <!-- Label -->
  <text x="30" y="26" font-family="Noto Sans JP, sans-serif" font-size="10" font-weight="700" fill="#1A3D6B" opacity="0.6" letter-spacing="2">EC SUPPORT</text>
</svg>
