<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.11"/>
    </filter>
    <clipPath id="cc">
      <rect x="20" y="10" width="560" height="338" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="360" fill="#ECEAE4"/>

  <!-- Card shadow -->
  <rect x="20" y="10" width="560" height="338" rx="10" fill="white" filter="url(#sh)"/>

  <!-- Clipped content -->
  <g clip-path="url(#cc)">
    <rect x="20" y="10" width="560" height="338" fill="white"/>

    <!-- Header -->
    <rect x="20" y="10" width="560" height="62" fill="#1A3D6B"/>

    <!-- Phone/SNS icon -->
    <circle cx="58" cy="41" r="20" fill="rgba(255,255,255,0.10)"/>
    <!-- Phone outline -->
    <rect x="46" y="26" width="24" height="30" rx="4" fill="white" opacity="0.92"/>
    <!-- Screen area -->
    <rect x="49" y="29" width="18" height="18" rx="2" fill="#1A3D6B" opacity="0.12"/>
    <!-- Signal bars (chart icon) -->
    <rect x="51" y="42" width="3" height="4" rx="1" fill="#1A3D6B" opacity="0.6"/>
    <rect x="56" y="39" width="3" height="7" rx="1" fill="#1A3D6B" opacity="0.6"/>
    <rect x="61" y="36" width="3" height="10" rx="1" fill="#1A3D6B" opacity="0.6"/>
    <!-- Home button -->
    <circle cx="58" cy="52" r="2.5" fill="rgba(26,61,107,0.25)"/>

    <!-- Header text -->
    <text x="89" y="37" font-family="Noto Sans JP, Hiragino Kaku Gothic ProN, sans-serif" font-size="14" font-weight="700" fill="white">SNS運用サポート</text>
    <circle cx="90" cy="53" r="4" fill="#4ADE80"/>
    <text x="99" y="57" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.70)">オンライン</text>

    <!-- Divider -->
    <line x1="20" y1="72" x2="580" y2="72" stroke="#F0EDE8" stroke-width="1"/>

    <!-- Timestamp -->
    <text x="300" y="92" font-family="Arial, sans-serif" font-size="10" fill="#CCCCCC" text-anchor="middle">本日 10:15</text>

    <!-- User bubble (right) -->
    <rect x="248" y="100" width="308" height="40" rx="20" fill="#E5ECF8"/>
    <text x="266" y="124" font-family="Noto Sans JP, Hiragino Kaku Gothic ProN, sans-serif" font-size="12" fill="#1A1A1A">Instagram投稿文を作ってください</text>

    <!-- Bot bubble (left) -->
    <rect x="24" y="154" width="358" height="148" rx="14" fill="#EEF2FF"/>
    <rect x="24" y="154" width="5" height="148" rx="2.5" fill="#1A3D6B"/>

    <!-- Bot header -->
    <text x="43" y="176" font-family="Noto Sans JP, Hiragino Kaku Gothic ProN, sans-serif" font-size="12" font-weight="700" fill="#1A3D6B">こちらはいかがでしょうか？</text>

    <!-- Generated post card -->
    <rect x="43" y="184" width="322" height="90" rx="6" fill="white" stroke="#D5D2CA" stroke-width="1"/>
    <!-- Post content lines -->
    <text x="57" y="204" font-family="Noto Sans JP, Hiragino Kaku Gothic ProN, sans-serif" font-size="11.5" fill="#1A1A1A">今日のモーニングルーティン</text>
    <text x="57" y="222" font-family="Noto Sans JP, sans-serif" font-size="11" fill="#444444">朝のストレッチで一日を気持ちよく</text>
    <text x="57" y="239" font-family="Noto Sans JP, sans-serif" font-size="11" fill="#444444">スタート。毎日の積み重ねが...</text>
    <!-- Hashtags -->
    <text x="57" y="258" font-family="Noto Sans JP, sans-serif" font-size="11" fill="#2C5899">#朝活　#ライフスタイル　#ルーティン</text>

    <!-- Footer text -->
    <text x="43" y="288" font-family="Noto Sans JP, sans-serif" font-size="11" fill="#666666">ハッシュタグの調整もできます。</text>

    <!-- Input area -->
    <rect x="20" y="304" width="560" height="44" fill="#F6F5F0"/>
    <line x1="20" y1="304" x2="580" y2="304" stroke="#E0DDD6" stroke-width="1"/>
    <rect x="34" y="316" width="428" height="20" rx="10" fill="white" stroke="#D5D2CA" stroke-width="1"/>
    <text x="50" y="330" font-family="Noto Sans JP, sans-serif" font-size="10" fill="#CCCCCC">メッセージを入力...</text>
    <rect x="474" y="314" width="66" height="24" rx="12" fill="#1A3D6B"/>
    <text x="507" y="330" font-family="Noto Sans JP, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">送信</text>
  </g>
</svg>
