<svg xmlns="http://www.w3.org/2000/svg" width="600" height="260" viewBox="0 0 600 260">
  <!-- Background -->
  <rect width="600" height="260" fill="#F2F8F5"/>

  <!-- Decorative circles -->
  <circle cx="560" cy="220" r="50" fill="#B8D8C8" opacity="0.35"/>
  <circle cx="50" cy="40" r="30" fill="#B8D8C8" opacity="0.3"/>

  <!-- Building silhouettes (background) -->
  <rect x="30" y="140" width="50" height="90" rx="2" fill="#1A3D6B" opacity="0.07"/>
  <rect x="85" y="110" width="40" height="120" rx="2" fill="#1A3D6B" opacity="0.05"/>
  <rect x="130" y="130" width="35" height="100" rx="2" fill="#1A3D6B" opacity="0.06"/>

  <!-- Main house (large, centered-left) -->
  <!-- Roof -->
  <polygon points="180,55 310,55 320,105 170,105" fill="#1A3D6B" opacity="0.85"/>
  <!-- Chimney -->
  <rect x="285" y="36" width="18" height="28" rx="2" fill="#1A3D6B" opacity="0.7"/>
  <!-- House body -->
  <rect x="170" y="105" width="150" height="110" rx="2" fill="white" stroke="#1A3D6B" stroke-width="3"/>
  <!-- Door -->
  <rect x="225" y="160" width="40" height="55" rx="3" fill="#1A3D6B" opacity="0.18"/>
  <circle cx="258" cy="189" r="3" fill="#1A3D6B" opacity="0.4"/>
  <!-- Left window -->
  <rect x="183" y="120" width="36" height="28" rx="3" fill="#D4E8F0" stroke="#1A3D6B" stroke-width="2" opacity="0.9"/>
  <line x1="201" y1="120" x2="201" y2="148" stroke="#1A3D6B" stroke-width="1.5" opacity="0.5"/>
  <line x1="183" y1="134" x2="219" y2="134" stroke="#1A3D6B" stroke-width="1.5" opacity="0.5"/>
  <!-- Right window -->
  <rect x="271" y="120" width="36" height="28" rx="3" fill="#D4E8F0" stroke="#1A3D6B" stroke-width="2" opacity="0.9"/>
  <line x1="289" y1="120" x2="289" y2="148" stroke="#1A3D6B" stroke-width="1.5" opacity="0.5"/>
  <line x1="271" y1="134" x2="307" y2="134" stroke="#1A3D6B" stroke-width="1.5" opacity="0.5"/>

  <!-- Location pin on roof -->
  <circle cx="245" cy="30" r="14" fill="#E05050"/>
  <circle cx="245" cy="27" r="6" fill="white"/>
  <polygon points="236,36 245,52 254,36" fill="#E05050"/>

  <!-- Price speech bubble -->
  <rect x="365" y="55" width="210" height="90" rx="14" fill="#1A3D6B"/>
  <polygon points="365,105 345,113 365,120" fill="#1A3D6B"/>
  <text x="470" y="88" font-family="Noto Sans JP, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">この地域の家賃相場</text>
  <text x="470" y="116" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">¥82,000〜</text>
  <text x="470" y="136" font-family="Noto Sans JP, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">1LDK / 渋谷区エリア</text>

  <!-- Simple bar chart (rent comparison) -->
  <rect x="370" y="175" width="200" height="60" rx="8" fill="white" stroke="#D5D2CA" stroke-width="1"/>
  <text x="380" y="192" font-family="Noto Sans JP, sans-serif" font-size="9" fill="#888">近隣エリア比較</text>
  <!-- Bars -->
  <rect x="385" y="200" width="22" height="28" rx="2" fill="#1A3D6B" opacity="0.4"/>
  <rect x="415" y="192" width="22" height="36" rx="2" fill="#1A3D6B" opacity="0.6"/>
  <rect x="445" y="197" width="22" height="31" rx="2" fill="#1A3D6B" opacity="0.35"/>
  <rect x="475" y="206" width="22" height="22" rx="2" fill="#E05050" opacity="0.6"/>
  <rect x="505" y="202" width="22" height="26" rx="2" fill="#1A3D6B" opacity="0.3"/>
  <!-- Baseline -->
  <line x1="378" y1="228" x2="538" y2="228" stroke="#D5D2CA" stroke-width="1"/>

  <!-- Label -->
  <text x="30" y="26" font-family="Noto Sans JP, sans-serif" font-size="10" font-weight="700" fill="#1A3D6B" opacity="0.6" letter-spacing="2">RENT MARKET</text>
</svg>
